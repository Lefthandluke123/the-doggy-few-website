<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TDF Music Toolset</title>
    <style>
        :root {
            --bg-dark: #1a1c1a;
            --card-bg: #242b24;
            --celtic-green: #4a7c2c;
            --griffin-orange: #e67e22;
            --griffin-red: #c0392b;
            --text-light: #e0eadd;
            --lcd-bg: #0d110d;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header { text-align: center; margin: 20px 0; width: 90%; }
        
        /* De logo-stijl die rekening houdt met Base64 data */
        .logo { 
            max-height: 80px; 
            max-width: 100%; 
            height: auto; 
            margin-bottom: 10px; 
            object-fit: contain;
        }

        .tabs {
            display: flex; width: 100%; max-width: 500px;
            background: var(--card-bg); border-radius: 15px 15px 0 0;
            overflow: hidden; border: 2px solid var(--celtic-green); border-bottom: none;
        }

        .tab {
            flex: 1; padding: 15px; text-align: center; cursor: pointer;
            font-weight: bold; background: #1a1f1a; transition: 0.2s;
        }

        .tab.active { background: var(--card-bg); color: var(--celtic-green); border-bottom: 3px solid var(--celtic-green); }

        .container { width: 100%; max-width: 500px; padding: 0 10px 20px 10px; }

        .card {
            background: var(--card-bg); padding: 25px; border-radius: 0 0 25px 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
            border: 2px solid var(--celtic-green);
        }

        .tool-content { display: none; }
        .tool-content.active { display: block; }

        select, input[type=range] {
            width: 100%; padding: 12px; margin: 10px 0 20px 0;
            border-radius: 8px; background: #111; color: white; border: 1px solid var(--celtic-green); font-size: 16px;
        }

        button {
            width: 100%; padding: 18px; border: none; border-radius: 15px;
            font-size: 18px; font-weight: bold; color: white;
            background: var(--celtic-green); cursor: pointer; transition: 0.1s;
        }

        button.active-btn { background: var(--griffin-red); }

        .display-container { background: var(--lcd-bg); border-radius: 15px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--celtic-green); }
        .display { font-family: 'Courier New', monospace; font-size: 60px; font-weight: bold; color: var(--celtic-green); }
        .vu-meter { position: relative; width: 100%; height: 80px; background: #050705; border-radius: 12px; border: 1px solid var(--celtic-green); overflow: hidden; }
        .needle { position: absolute; bottom: 0; left: 50%; width: 2px; height: 60px; background: var(--griffin-red); transform-origin: bottom center; transition: transform 0.05s ease-out; }
        .in-tune-zone { position: absolute; top: 20px; left: 50%; width: 40px; height: 10px; background: rgba(74, 124, 44, 0.2); transform: translateX(-50%); }
        .active-tune { background: #2ecc71; box-shadow: 0 0 10px #2ecc71; }
        .bpm-display { font-size: 4rem; font-weight: bold; color: var(--celtic-green); }
        .beat-indicator { display: flex; justify-content: center; gap: 6px; margin-top: 20px; flex-wrap: wrap; }
        .dot { width: 14px; height: 14px; background: #333; border-radius: 50%; }
        .dot.lit { background: var(--celtic-green); transform: scale(1.3); }
        .dot.accent-mark { border: 2px solid var(--griffin-orange); }
        .hints { font-size: 13px; color: var(--griffin-orange); margin-top: 10px; font-weight: bold; min-height: 18px; }
    </style>
</head>

                </select>
                <button id="metroBtn">START METRONOOM</button>
                <div id="dotsContainer" class="beat-indicator"></div>
            </div>
        </div>
    </div>

    <script>
        // --- GLOBALE TAB LOGICA ---
        function switchTab(tabId) {
            document.querySelectorAll('.tool-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active');
            
            if (isRunningTuner) toggleTuner();
            if (isPlayingMetro) toggleMetro();
        }

        // --- TUNER LOGICA ---
        let audioCtx, analyser, isRunningTuner = false;
        const tunerBtn = document.getElementById('tunerBtn');
        const instrumentSelect = document.getElementById('instrumentSelect');
        
        const tunerLibrary = {
            chromatic: { h: "Alle noten herkenning" },
            violin: { h: "G3 - D4 - A4 - E5", s: [{n:'G', f:196.00}, {n:'D', f:293.66}, {n:'A', f:440.00}, {n:'E', f:659.25}] },
            guitar_standard: { h: "E2-A2-D3-G3-B3-E4", s: [{n:'E', f:82.41}, {n:'A', f:110.00}, {n:'D', f:146.83}, {n:'G', f:196.00}, {n:'B', f:246.94}, {n:'E', f:329.63}] },
            guitar_dadgad: { h: "D2-A2-D3-G3-A3-D4", s: [{n:'D', f:73.42}, {n:'A', f:110.00}, {n:'D', f:146.83}, {n:'G', f:196.00}, {n:'A', f:220.00}, {n:'D', f:293.66}] },
            ukulele: { h: "G4-C4-E4-A4", s: [{n:'G', f:392.00}, {n:'C', f:261.63}, {n:'E', f:329.63}, {n:'A', f:440.00}] }
        };

        async function toggleTuner() {
            if (!isRunningTuner) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
                audioCtx.createMediaStreamSource(stream).connect(analyser);
                isRunningTuner = true;
                tunerBtn.textContent = "STOP MICROFOON";
                tunerBtn.classList.add('active-btn');
                updateTuner();
            } else {
                if(audioCtx) audioCtx.close();
                isRunningTuner = false;
                tunerBtn.textContent = "START MICROFOON";
                tunerBtn.classList.remove('active-btn');
                document.getElementById('noteDisplay').textContent = "--";
            }
        }
        tunerBtn.onclick = toggleTuner;

        function updateTuner() {
            if (!isRunningTuner) return;
            const buffer = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buffer);
            const freq = autoCorrelate(buffer, audioCtx.sampleRate);
            
            if (freq !== -1) {
                document.getElementById('freqDisplay').textContent = freq.toFixed(2) + " Hz";
                let noteName, diff;
                const mode = tunerLibrary[instrumentSelect.value];
                
                if (mode.s) {
                    let closest = mode.s.reduce((p, c) => Math.abs(c.f-freq) < Math.abs(p.f-freq) ? c : p);
                    noteName = closest.n;
                    diff = 1200 * Math.log2(freq / closest.f);
                } else {
                    const pitch = 12 * Math.log2(freq / 440) + 69;
                    noteName = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'][Math.round(pitch)%12];
                    diff = (pitch - Math.round(pitch)) * 100;
                }
                document.getElementById('noteDisplay').textContent = noteName;
                document.getElementById('needle').style.transform = `translateX(-50%) rotate(${Math.max(-45, Math.min(45, diff))}deg)`;
                document.getElementById('tuneZone').classList.toggle('active-tune', Math.abs(diff) < 5);
            }
            requestAnimationFrame(updateTuner);
        }

        function autoCorrelate(buf, sr) {
            let rms = 0; for (let i=0; i<buf.length; i++) rms += buf[i]*buf[i];
            if (Math.sqrt(rms/buf.length) < 0.01) return -1;
            let c = new Float32Array(buf.length);
            for (let i=0; i<buf.length; i++) for (let j=0; j<buf.length-i; j++) c[i] += buf[j]*buf[j+i];
            let d = 0; while (c[d] > c[d+1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i=d; i<buf.length; i++) { if (c[i] > maxval) { maxval = c[i]; maxpos = i; } }
            return sr / maxpos;
        }

        // --- METRONOOM LOGIC ---
        let metroCtx, isPlayingMetro = false, currentBeat = 0, nextNoteTime = 0.0, metroTimer;
        const metroBtn = document.getElementById('metroBtn');
        const timeSig = document.getElementById('timeSig');

        function createDots() {
            const container = document.getElementById('dotsContainer');
            container.innerHTML = '';
            const count = parseInt(timeSig.value);
            for(let i=0; i<count; i++) {
                const d = document.createElement('div');
                d.className = 'dot';
                if(count === 9 && (i===0 || i===3 || i===6)) d.classList.add('accent-mark');
                container.appendChild(d);
            }
        }
        
        function toggleMetro() {
            if (!isPlayingMetro) {
                metroCtx = new (window.AudioContext || window.webkitAudioContext)();
                currentBeat = 0;
                nextNoteTime = metroCtx.currentTime + 0.05;
                isPlayingMetro = true;
                metroBtn.textContent = "STOP";
                metroBtn.classList.add('active-btn');
                metroScheduler();
            } else {
                clearTimeout(metroTimer);
                if(metroCtx) metroCtx.close();
                isPlayingMetro = false;
                metroBtn.textContent = "START METRONOOM";
                metroBtn.classList.remove('active-btn');
            }
        }

        function metroScheduler() {
            while (nextNoteTime < metroCtx.currentTime + 0.1) {
                const sig = parseInt(timeSig.value);
                const isAccent = (currentBeat === 0) || (sig === 9 && (currentBeat === 3 || currentBeat === 6));
                
                const osc = metroCtx.createOscillator();
                const gain = metroCtx.createGain();
                osc.frequency.value = isAccent ? 1000 : 600;
                gain.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + 0.1);
                osc.connect(gain); gain.connect(metroCtx.destination);
                osc.start(nextNoteTime); osc.stop(nextNoteTime + 0.1);

                const bIdx = currentBeat;
                setTimeout(() => {
                    document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('lit', i === bIdx));
                }, (nextNoteTime - metroCtx.currentTime) * 1000);

                const tempo = parseInt(document.getElementById('tempoSlider').value);
                const secondsPerBeat = 60.0 / tempo;
                nextNoteTime += (sig === 6 || sig === 9) ? secondsPerBeat / 2 : secondsPerBeat;
                currentBeat = (currentBeat + 1) % sig;
            }
            metroTimer = setTimeout(metroScheduler, 25);
        }

        // Event Listeners
        createDots();
        timeSig.onchange = createDots;
        metroBtn.onclick = toggleMetro;
        document.getElementById('tempoSlider').oninput = (e) => document.getElementById('bpmText').textContent = e.target.value;
        instrumentSelect.onchange = () => document.getElementById('tunerHints').textContent = tunerLibrary[instrumentSelect.value].h;
    </script>
</body>
</html>
